async function sheetsAPI(url,payload){
  const res=await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});
  const j=await res.json();if(!j.ok)throw new Error(j.error);return j;
}
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,r=d=>d*Math.PI/180,dL=r(lat2-lat1),dG=r(lng2-lng1);
  const a=Math.sin(dL/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function useGPS(){
  const[s,set]=useState({status:"idle",lat:null,lng:null,accuracy:null,error:null});
  const req=useCallback(()=>{
    if(!navigator.geolocation)return set(s=>({...s,status:"error",error:"GPS not supported"}));
    set(s=>({...s,status:"locating",error:null}));
    navigator.geolocation.getCurrentPosition(
      p=>set({status:"ok",lat:p.coords.latitude,lng:p.coords.longitude,accuracy:Math.round(p.coords.accuracy),error:null}),
      e=>set(s=>({...s,status:"error",error:e.code===1?"Location permission denied":e.code===2?"Cannot detect location":"Location timed out"})),
      {enableHighAccuracy:true,timeout:12000,maximumAge:0}
    );
  },[]);
  return{...s,request:req};
}

// Calculate work hours from punches for a day — supports unlimited IN/OUT/BREAK punches
function calcDayHours(punches){
  const sorted=[...punches].sort((a,b)=>a.ts-b.ts);
  let workMs=0,breakMs=0,workStart=null,breakStart=null;
  let firstIn=null,lastOut=null;
  for(const p of sorted){
    if(p.type==="IN"){
      if(!firstIn)firstIn=p;
      // If coming back from break, close break timer
      if(breakStart){breakMs+=p.ts-breakStart.ts;breakStart=null;}
      // Start work timer if not already running
      if(!workStart)workStart=p;
    } else if(p.type==="OUT"){
      lastOut=p;
      // Close work timer
      if(workStart){workMs+=p.ts-workStart.ts;workStart=null;}
      // Close break timer if somehow open
      if(breakStart){breakStart=null;}
    } else if(p.type==="BOUT"){
      // Going on break — close work timer
      if(workStart){workMs+=p.ts-workStart.ts;workStart=null;}
      breakStart=p;
    } else if(p.type==="BIN"){
      // Back from break — close break timer, start work
      if(breakStart){breakMs+=p.ts-breakStart.ts;breakStart=null;}
      workStart=p;
    }
  }
  // Still clocked in with no final OUT — count up to now
  if(workStart&&!lastOut){workMs+=Date.now()-workStart.ts;}
  const totalHrs=workMs/3600000;
  const breakHrs=breakMs/3600000;
  const overtimeHrs=Math.max(0,totalHrs-FIXED_HOURS);
  const inCount=punches.filter(p=>p.type==="IN").length;
  const hasOut=punches.some(p=>p.type==="OUT");
  // Full day = at least 2 CHECK-INs + final CHECK-OUT (morning + after lunch minimum)
  // Half day = 1 CHECK-IN + CHECK-OUT
  // Active = checked in, not yet checked out
  let status="absent";
  if(inCount>=2&&hasOut)status="present";
  else if(inCount===1&&hasOut)status="half";
  else if(inCount>=1)status="active";
  return{
    totalHrs:Math.round(totalHrs*100)/100,
    breakHrs:Math.round(breakHrs*100)/100,
    overtimeHrs:Math.round(overtimeHrs*100)/100,
    status,firstIn:firstIn?.time||null,lastOut:lastOut?.time||null,
    punchCount:punches.length,inCount
  };
}

// Salary calc
function salaryCalc(staff,punches,advances,month,year){
  const dim=new Date(year,month,0).getDate();
  const wod=staff.weeklyOff??0;
  let workingDays=0,weeklyOffDays=0;
  for(let i=1;i<=dim;i++){const dow=new Date(year,month-1,i).getDay();if(dow===wod)weeklyOffDays++;else workingDays++;}
  const totalPaid=workingDays+weeklyOffDays;
  const perDay=staff.monthlySalary/totalPaid;
  const perHr=staff.monthlySalary/(totalPaid*FIXED_HOURS);
  let earned=0,dp=0,dh=0,da=0,wow=0,totalOT=0,lateDays=0;
  for(let i=1;i<=dim;i++){
    const d=new Date(year,month-1,i);
    const ds=d.toISOString().split("T")[0];
    const dow=d.getDay();const isWOff=dow===wod;
    const dayPunches=(punches[ds]||[]).filter(p=>p.staffId===staff.id);
    const info=dayPunches.length>0?calcDayHours(dayPunches):{status:"absent",totalHrs:0,overtimeHrs:0};
    if(isWOff){
      earned+=perDay;
      if(info.status==="present"||info.status==="active"){wow++;earned+=perDay;}
    } else {
      const today2=new Date();today2.setHours(0,0,0,0);
      if(info.status==="present"||info.status==="active"){dp++;earned+=perDay;totalOT+=info.overtimeHrs;}
      else if(info.status==="half"){dh++;earned+=perDay*0.5;}
      else if(d<=today2){da++;}
      // late: first IN after staff's expected time — we just track it
    }
  }
  const otPay=Math.round(totalOT*perHr);
  const mk=toMK(year,month);
  const sa=advances.filter(a=>a.staffId===staff.id);
  const mAdv=sa.filter(a=>a.month===mk);
  const advTaken=mAdv.filter(a=>a.type==="taken").reduce((s,a)=>s+a.amount,0);
  const advDep=mAdv.filter(a=>a.type==="deposit").reduce((s,a)=>s+a.amount,0);
  const allTaken=sa.filter(a=>a.type==="taken").reduce((s,a)=>s+a.amount,0);
  const allDep=sa.filter(a=>a.type==="deposit").reduce((s,a)=>s+a.amount,0);
  const advDue=Math.max(0,(staff.advancePrev||0)+allTaken-allDep);
  return{earned:Math.round(earned)+otPay,baseSalary:Math.round(earned),otPay,perDay:Math.round(perDay),perHr:Math.round(perHr),totalPaid,workingDays,weeklyOffDays,daysPresent:dp,daysHalf:dh,daysAbsent:da,weeklyOffWorked:wow,totalOT:Math.round(totalOT*100)/100,advTaken,advDep,advDue};
}

// ── Face Comparison (canvas pixel diff) ──────────────────
async function compareFaces(refDataUrl,liveDataUrl){
  // Simple brightness/color histogram comparison — works without external API
  // Returns similarity 0-1
  return new Promise(resolve=>{
    const canvas1=document.createElement("canvas");
    const canvas2=document.createElement("canvas");
    const SIZE=32; // downscale to 32x32 for comparison
    canvas1.width=canvas2.width=SIZE;
    canvas1.height=canvas2.height=SIZE;
    const ctx1=canvas1.getContext("2d");
    const ctx2=canvas2.getContext("2d");
    const img1=new Image(),img2=new Image();
    let loaded=0;
    const check=()=>{
      if(++loaded<2)return;
      ctx1.drawImage(img1,0,0,SIZE,SIZE);
      ctx2.drawImage(img2,0,0,SIZE,SIZE);
      const d1=ctx1.getImageData(0,0,SIZE,SIZE).data;
      const d2=ctx2.getImageData(0,0,SIZE,SIZE).data;
      let diff=0;
      for(let i=0;i<d1.length;i+=4){
        diff+=Math.abs(d1[i]-d2[i])+Math.abs(d1[i+1]-d2[i+1])+Math.abs(d1[i+2]-d2[i+2]);
      }
      const maxDiff=255*3*SIZE*SIZE;
      const similarity=1-(diff/maxDiff);
      resolve(similarity);
    };
    img1.onload=check;img2.onload=check;
    img1.crossOrigin="anonymous";img2.crossOrigin="anonymous";
    img1.src=refDataUrl;img2.src=liveDataUrl;
  });
}

// ── FACE CAMERA ──────────────────────────────────────────
function FaceCamera({onCapture,onCancel,label,scanning}){
  const videoRef=useRef(null);const streamRef=useRef(null);
  const[ready,setReady]=useState(false);
  const[facing,setFacing]=useState("user");
  useEffect(()=>{
    let active=true;
    async function start(){
      try{
        const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:640},height:{ideal:480}},audio:false});
        streamRef.current=s;
        if(videoRef.current&&active){videoRef.current.srcObject=s;videoRef.current.onloadeddata=()=>setReady(true);}
      }catch(e){alert("Camera error: "+e.message);}
    }
    start();
    return()=>{active=false;streamRef.current?.getTracks().forEach(t=>t.stop());};
  },[facing]);
  function capture(){
    const v=videoRef.current;if(!v)return;
    const c=document.createElement("canvas");c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext("2d").drawImage(v,0,0);
    onCapture(c.toDataURL("image/jpeg",0.85));
  }
  function uploadFile(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>onCapture(ev.target.result);r.readAsDataURL(f);
  }
  const fileRef=useRef(null);
  return(<div style={{textAlign:"center"}}>
    <p style={{color:GOLD,fontSize:13,fontWeight:700,marginBottom:10}}>{label||"Position your face in the frame"}</p>
    <div style={{position:"relative",maxWidth:320,margin:"0 auto 14px",borderRadius:12,overflow:"hidden",border:`2px solid ${GOLD}`}}>
      <video ref={videoRef} autoPlay playsInline muted style={{width:"100%",display:"block",background:SURFACE2}}/>
      {/* Scan overlay */}
      {scanning&&ready&&<div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
        <div style={{position:"absolute",left:"50%",top:"10%",transform:"translateX(-50%)",width:"60%",paddingBottom:"80%",border:`2px solid ${GREEN}`,borderRadius:"50%",opacity:0.6}}/>
        <div style={{position:"absolute",left:"10%",right:"10%",height:2,background:`linear-gradient(90deg,transparent,${GREEN},transparent)`,animation:"scanline 2s linear infinite",top:0}}/>
      </div>}
      {!ready&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:SURFACE2}}><Spinner/></div>}
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
      <button onClick={capture} disabled={!ready} style={{background:`linear-gradient(135deg,${GOLD},#8B6914)`,border:"none",borderRadius:50,width:60,height:60,color:BLACK,fontSize:24,cursor:"pointer",opacity:ready?1:0.5}}>📸</button>
      <button onClick={()=>fileRef.current?.click()} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:50,width:60,height:60,color:GOLD,fontSize:20,cursor:"pointer"}}>📁</button>
    </div>
    <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={uploadFile}/>
    <button onClick={onCancel} style={{background:"none",border:"none",color:TEXT_DIM,fontSize:13,cursor:"pointer",marginTop:14,display:"block",margin:"14px auto 0"}}>← Cancel</button>
  </div>);
}

// ── PUNCH FLOW (Staff View) ───────────────────────────────
function PunchPanel({staffList,punches,setPunches,office,scriptUrl,setSyncStatus}){
  const[step,setStep]=useState("list"); // list|face_setup|face_verify|punch_type|done
  const[selected,setSelected]=useState(null);
  const[capturedPhoto,setCapturedPhoto]=useState(null);
  const[punchType,setPunchType]=useState(null);
  const[gpsCheck,setGpsCheck]=useState({done:false,ok:false,dist:null});
  const[faceResult,setFaceResult]=useState(null); // null|checking|ok|fail
  const[now]=useState(new Date());
  const today=todayStr();
  const gps=useGPS();

  // Get today's punches for a staff member
  const getTodayPunches=id=>(punches[today]||[]).filter(p=>p.staffId===id);

  // What punch type is next for this staff?
  function nextPunchType(id){
    const tp=getTodayPunches(id);
    if(tp.length===0)return"IN";
    const last=tp[tp.length-1];
    if(last.type==="IN")return"BOUT"; // can go to break or OUT
    if(last.type==="BOUT")return"BIN";
    if(last.type==="BIN")return"BOUT"; // can do another break or OUT
    if(last.type==="OUT")return null; // day complete
    return"IN";
  }
  function availablePunches(id){
    const tp=getTodayPunches(id);
    if(tp.length===0)return["IN"];
    const last=tp[tp.length-1];
    if(last.type==="IN")return["BOUT","OUT"];
    if(last.type==="BOUT")return["BIN"];
    if(last.type==="BIN")return["BOUT","OUT"];
    if(last.type==="OUT")return[];
    return["IN"];
  }

  function selectStaff(s){
    setSelected(s);
    if(!s.photo){setStep("face_setup");}
    else{gps.request();setStep("face_verify");}
  }

  // Face setup — register photo for new staff
  async function handleSetupPhoto(dataUrl){
    // Save photo to staff
    selected._photoCallback&&selected._photoCallback(dataUrl);
    setCapturedPhoto(dataUrl);
    gps.request();
    setStep("face_verify");
  }

  // Face verify
  async function handleVerifyPhoto(dataUrl){
    setCapturedPhoto(dataUrl);
    if(!selected.photo){
      // No reference yet — this IS the registration
      setFaceResult("ok");
      setStep("punch_type");
      return;
    }
    setFaceResult("checking");
    try{
      const sim=await compareFaces(selected.photo,dataUrl);
      if(sim>=FACE_THRESHOLD){setFaceResult("ok");setStep("punch_type");}
      else{setFaceResult("fail");}
    }catch{setFaceResult("fail");}
  }

  useEffect(()=>{
    if(gps.status==="ok"&&office?.set){
      const dist=Math.round(haversine(gps.lat,gps.lng,office.lat,office.lng));
      setGpsCheck({done:true,ok:dist<=office.radiusMeters,dist});
    } else if(gps.status==="ok"&&!office?.set){
      setGpsCheck({done:true,ok:true,dist:null});
    } else if(gps.status==="error"){
      setGpsCheck({done:true,ok:!office?.set,dist:null});
    }
  },[gps.status,gps.lat,gps.lng]);

  async function submitPunch(type){
    const ts=Date.now();
    const timeStr=fmt(new Date(ts));
    const record={staffId:selected.id,staffName:selected.name,type,time:timeStr,ts,date:today,selfie:capturedPhoto,gps:gps.status==="ok"?{lat:gps.lat,lng:gps.lng,dist:gpsCheck.dist}:null};
    const newPunches={...punches,[today]:[...(punches[today]||[]),record]};
    setPunches(newPunches);
    setPunchType(type);
    setStep("done");
    if(scriptUrl){setSyncStatus("syncing");try{await sheetsAPI(scriptUrl,{action:"punch",...record});setSyncStatus("ok");}catch{setSyncStatus("error");}setTimeout(()=>setSyncStatus(null),3000);}
  }

  function reset(){setSelected(null);setCapturedPhoto(null);setPunchType(null);setFaceResult(null);setGpsCheck({done:false,ok:false,dist:null});setStep("list");}

  // DONE
  if(step==="done"){
    const pt=PUNCH_TYPES[punchType]||{};
    const tp=getTodayPunches(selected?.id);
    const info=calcDayHours(tp);
    return(<div style={{textAlign:"center",padding:"30px 0"}}>
      <div style={{fontSize:56,marginBottom:12}}>{pt.icon}</div>
      <h2 style={{color:GOLD,fontSize:20,fontWeight:800,marginBottom:6}}>{pt.label} Recorded</h2>
      <p style={{color:"#fff",fontSize:16,marginBottom:3}}>{selected?.name}</p>
      <p style={{color:TEXT_DIM,fontSize:13,marginBottom:16}}>{fmtDate(now)} · {fmt(new Date())}</p>
      {capturedPhoto&&<img src={capturedPhoto} alt="" style={{width:90,height:90,borderRadius:"50%",objectFit:"cover",border:`3px solid ${pt.color}`,display:"block",margin:"0 auto 16px"}}/>}

        {info.firstIn&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:TEXT_DIM,fontSize:13}}>First In</span><span style={{color:GREEN,fontWeight:700}}>{info.firstIn}</span></div>}
        {info.totalHrs>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:TEXT_DIM,fontSize:13}}>Hours Worked</span><span style={{color:GOLD,fontWeight:700}}>{info.totalHrs.toFixed(2)}h</span></div>}
        {info.overtimeHrs>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:TEXT_DIM,fontSize:13}}>Overtime</span><span style={{color:PURPLE,fontWeight:700}}>+{info.overtimeHrs.toFixed(2)}h</span></div>}
      </div>

    </div>);
  }

  // FACE SETUP (no photo yet)
  if(step==="face_setup"){return(<div>
    <button onClick={reset} style={{background:"none",border:"none",color:GOLD,cursor:"pointer",fontSize:13,fontWeight:700,marginBottom:16,padding:0}}>← Back</button>
    <div style={{background:`${BLUE}12`,border:`1px solid ${BLUE}44`,borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,color:BLUE}}>📸 <strong>{selected?.name}</strong> — No reference photo saved. Take a clear selfie to register your face.</div>
    <FaceCamera onCapture={handleSetupPhoto} onCancel={reset} label="Take a clear selfie for face registration" scanning={false}/>
  </div>);}

  // FACE VERIFY
  if(step==="face_verify"){return(<div>
    <button onClick={reset} style={{background:"none",border:"none",color:GOLD,cursor:"pointer",fontSize:13,fontWeight:700,marginBottom:16,padding:0}}>← Back</button>

    <p style={{color:TEXT_DIM,fontSize:13,marginBottom:14}}>{fmtDate(now)} · {fmt(new Date())}</p>
    {!gpsCheck.done&&office?.set&&<div style={{background:`${BLUE}12`,border:`1px solid ${BLUE}33`,borderRadius:8,padding:"8px 12px",fontSize:12,color:BLUE,marginBottom:12,display:"flex",alignItems:"center",gap:8}}><Spinner color={BLUE}/> Checking GPS…</div>}
    {gpsCheck.done&&office?.set&&<div style={{background:gpsCheck.ok?`${GREEN}12`:`${RED}12`,border:`1px solid ${gpsCheck.ok?GREEN:RED}44`,borderRadius:8,padding:"8px 12px",fontSize:12,color:gpsCheck.ok?GREEN:RED,marginBottom:12}}>
      {gpsCheck.ok?`✅ At store · ${gpsCheck.dist}m`:`❌ Not at store · ${gpsCheck.dist}m away`}
    </div>}
    {faceResult==="checking"&&<div style={{background:`${BLUE}12`,border:`1px solid ${BLUE}33`,borderRadius:8,padding:"8px 12px",fontSize:12,color:BLUE,marginBottom:12,display:"flex",alignItems:"center",gap:8}}><Spinner color={BLUE}/> Verifying face…</div>}
    {faceResult==="fail"&&<div style={{background:`${RED}12`,border:`1px solid ${RED}44`,borderRadius:8,padding:"10px 14px",fontSize:13,color:RED,marginBottom:12}}>
      ❌ Face does not match. Please try again in good lighting.<br/>
      <button onClick={()=>setFaceResult(null)} style={{background:`${RED}22`,border:`1px solid ${RED}`,borderRadius:6,padding:"6px 14px",color:RED,fontSize:12,fontWeight:700,cursor:"pointer",marginTop:8}}>Try Again</button>
    </div>}
    {faceResult!=="fail"&&faceResult!=="checking"&&gpsCheck.ok!==false&&<FaceCamera onCapture={handleVerifyPhoto} onCancel={reset} label="Look at camera to verify your face" scanning={true}/>}
    {gpsCheck.done&&!gpsCheck.ok&&office?.set&&<div style={{textAlign:"center",marginTop:12}}><p style={{color:RED,fontSize:13,marginBottom:10}}>You must be inside the store to punch attendance.</p><button onClick={()=>gps.request()} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,padding:"8px 18px",color:"#fff",fontSize:13,cursor:"pointer"}}>Retry GPS</button></div>}
  </div>);}

  // PUNCH TYPE SELECT
  if(step==="punch_type"){
    const avail=availablePunches(selected?.id);
    if(avail.length===0){return(<div style={{textAlign:"center",padding:"30px 0"}}>
      <div style={{fontSize:48,marginBottom:12}}>✅</div>
      <h3 style={{color:GOLD,fontSize:18,fontWeight:700,marginBottom:8}}>Day Complete</h3>
      <p style={{color:TEXT_DIM,fontSize:13,marginBottom:16}}>{selected?.name} has already checked out today.</p>
      <button onClick={reset} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 20px",color:GOLD,fontSize:14,cursor:"pointer"}}>Back</button>
    </div>);}
    return(<div>
      <button onClick={()=>setStep("face_verify")} style={{background:"none",border:"none",color:GOLD,cursor:"pointer",fontSize:13,fontWeight:700,marginBottom:16,padding:0}}>← Back</button>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
        {capturedPhoto&&<img src={capturedPhoto} alt="" style={{width:48,height:48,borderRadius:"50%",objectFit:"cover",border:`2px solid ${GREEN}`}}/>}
        <div><h3 style={{color:GOLD,fontSize:16,fontWeight:700}}>{selected?.name}</h3><p style={{color:TEXT_DIM,fontSize:12}}>{fmtDate(now)} · {fmt(new Date())}</p></div>
      </div>
      <div style={{background:`${GREEN}12`,border:`1px solid ${GREEN}44`,borderRadius:8,padding:"6px 12px",fontSize:12,color:GREEN,marginBottom:16}}>✅ Face verified · {gpsCheck.dist!=null?`📍 ${gpsCheck.dist}m from store`:"GPS check not required"}</div>
      <GoldDiv/>
      <p style={{color:TEXT_DIM,fontSize:13,marginBottom:12}}>Select punch type:</p>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {avail.map(t=>{const p=PUNCH_TYPES[t];return(<button key={t} onClick={()=>submitPunch(t)}
          style={{background:SURFACE2,border:`2px solid ${p.color}`,borderRadius:12,padding:"16px 18px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:24}}>{p.icon}</span>
          <div><div style={{color:p.color,fontSize:15,fontWeight:800}}>{p.label}</div><div style={{color:TEXT_DIM,fontSize:12,marginTop:2}}>{p.desc}</div></div>
        </button>);})}
      </div>
    </div>);
  }

  // STAFF LIST
  const now2=new Date();
  return(<div>
    <h2 style={{color:GOLD,fontSize:18,fontWeight:700,marginBottom:3}}>Punch Attendance</h2>
    <p style={{color:TEXT_DIM,fontSize:13,marginBottom:6}}>{fmtDate(now2)} · {fmt(now2)}</p>
    <div style={{background:`${BLUE}12`,border:`1px solid ${BLUE}33`,borderRadius:8,padding:"7px 12px",fontSize:11,color:BLUE,marginBottom:14}}>Face scan + GPS required for every punch</div>
    <GoldDiv/>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {staffList.filter(s=>!s.isFounder).map(s=>{
        const tp=getTodayPunches(s.id);
        const info=tp.length>0?calcDayHours(tp):null;
        const avail=availablePunches(s.id);
        const last=tp[tp.length-1];
        const dayDone=avail.length===0;
        return(<div key={s.id} onClick={()=>!dayDone&&selectStaff(s)}

          <div style={{display:"flex",alignItems:"center",gap:12}}>

            </div>
          </div>
          <div style={{textAlign:"right"}}>
            {last?<div>
              <PunchBadge type={last.type}/>
              <div style={{color:TEXT_DIM,fontSize:10,marginTop:3}}>{last.time}</div>
              {info?.totalHrs>0&&<div style={{color:GOLD,fontSize:10,marginTop:2}}>{info.totalHrs.toFixed(1)}h worked</div>}
              {info?.overtimeHrs>0&&<div style={{color:PURPLE,fontSize:10}}>+{info.overtimeHrs.toFixed(1)}h OT</div>}
            </div>:<span style={{color:GOLD,fontSize:12,fontWeight:700}}>Tap to punch →</span>}
          </div>
        </div>);
      })}
    </div>
  </div>);
}

// ── PUNCH LOG (Admin) ────────────────────────────────────
function PunchLogPanel({staffList,punches}){
  const now=new Date();
  const[sel,setSel]=useState(staffList[0]?.id);
  const[month,setMonth]=useState(now.getMonth()+1);
  const[year,setYear]=useState(now.getFullYear());
  const staff=staffList.find(s=>s.id===sel);
  const mk=toMK(year,month);
  const dim=new Date(year,month,0).getDate();
  const rows=useMemo(()=>Array.from({length:dim},(_,i)=>{
    const d=new Date(year,month-1,i+1);
    const ds=d.toISOString().split("T")[0];
    const dp=(punches[ds]||[]).filter(p=>p.staffId===sel).sort((a,b)=>a.ts-b.ts);
    const info=dp.length>0?calcDayHours(dp):{status:d>now?"future":"absent",totalHrs:0,overtimeHrs:0,breakHrs:0,firstIn:null,lastOut:null,punchCount:0};
    const isWOff=d.getDay()===(staff?.weeklyOff??0);
    return{day:i+1,ds,dp,info,isWOff,isFuture:d>now};
  }),[sel,month,year,punches,staff]);

  const totPresent=rows.filter(r=>r.info.status==="present").length;
  const totHalf=rows.filter(r=>r.info.status==="half").length;
  const totOT=rows.reduce((s,r)=>s+r.info.overtimeHrs,0);
  const totHrs=rows.reduce((s,r)=>s+r.info.totalHrs,0);

  const[expandRow,setExpandRow]=useState(null);

  const stc={color:TEXT_DIM,fontSize:12,textAlign:"left",padding:"6px 8px",fontWeight:600,borderBottom:`1px solid ${BORDER}`};
  const dtc={color:"#fff",fontSize:12,padding:"6px 8px",borderBottom:`1px solid ${BORDER}20`};

  return(<div>

        <select value={month} onChange={e=>setMonth(Number(e.target.value))} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:6,padding:"7px 10px",color:"#fff",fontSize:12,outline:"none"}}>{MN.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select>
        <select value={year} onChange={e=>setYear(Number(e.target.value))} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:6,padding:"7px 10px",color:"#fff",fontSize:12,outline:"none"}}>{[2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}</select>
      </div>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
      {[["Present",totPresent,GREEN],["Half Day",totHalf,GOLD],["Total Hrs",totHrs.toFixed(1)+"h",BLUE],["Overtime",totOT.toFixed(1)+"h",PURPLE]].map(([l,v,c])=>(
        <div key={l} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,padding:"8px 12px",flex:1,minWidth:70}}>
          <div style={{color:TEXT_DIM,fontSize:9,textTransform:"uppercase",marginBottom:2}}>{l}</div>
          <div style={{color:c,fontSize:15,fontWeight:800}}>{v}</div>
        </div>
      ))}
    </div>
    <GoldDiv/>
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{background:SURFACE2}}>
          <th style={stc}>Date</th><th style={stc}>Status</th><th style={stc}>In</th><th style={stc}>Out</th><th style={stc}>Worked</th><th style={stc}>Break</th><th style={stc}>OT</th><th style={stc}>Punches</th>
        </tr></thead>
        <tbody>
          {rows.map(({day,ds,dp,info,isWOff,isFuture})=>{
            const d=new Date(year,month-1,day);
            const sc=isWOff?PURPLE:info.status==="present"?GREEN:info.status==="half"?GOLD:info.status==="active"?BLUE:info.status==="absent"&&!isFuture?RED:TEXT_DIM;
            const label=isWOff&&info.punchCount===0?"Weekly Off":info.status==="active"?"⏱ Working":info.status==="present"?"Present":info.status==="half"?"Half Day":info.status==="absent"&&!isFuture?"Absent":"-";
            return(<React.Fragment key={ds}>
              <tr onClick={()=>dp.length>0&&setExpandRow(expandRow===ds?null:ds)} style={{cursor:dp.length>0?"pointer":"default",background:expandRow===ds?`${GOLD}08`:"transparent"}}>
                <td style={{...dtc,color:TEXT_DIM}}>{MN[d.getMonth()]} {day} <span style={{fontSize:10,color:BORDER}}>({DAYS[d.getDay()].slice(0,3)})</span></td>
                <td style={{...dtc}}><span style={{color:sc,fontWeight:700,fontSize:11}}>{label}{isWOff&&info.punchCount>0?" (2x)":""}</span></td>
                <td style={{...dtc,color:GREEN}}>{info.firstIn||"-"}</td>
                <td style={{...dtc,color:RED}}>{info.lastOut||"-"}</td>
                <td style={{...dtc,color:GOLD}}>{info.totalHrs>0?info.totalHrs.toFixed(2)+"h":"-"}</td>
                <td style={{...dtc,color:ORANGE}}>{info.breakHrs>0?info.breakHrs.toFixed(2)+"h":"-"}</td>
                <td style={{...dtc,color:PURPLE}}>{info.overtimeHrs>0?"+"+info.overtimeHrs.toFixed(2)+"h":"-"}</td>
                <td style={{...dtc,color:TEXT_DIM}}>{dp.length>0?dp.length+" ▼":"-"}</td>
              </tr>
              {expandRow===ds&&dp.length>0&&<tr><td colSpan={8} style={{padding:"0 8px 10px",background:`${GOLD}05`}}>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:6}}>
                  {dp.map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,background:SURFACE2,borderRadius:6,padding:"7px 10px"}}>
                    {p.selfie&&<img src={p.selfie} alt="" style={{width:30,height:30,borderRadius:"50%",objectFit:"cover",border:`1px solid ${PUNCH_TYPES[p.type]?.color||BORDER}`}}/>}
                    <PunchBadge type={p.type}/>
                    <span style={{color:"#fff",fontSize:12,fontWeight:700}}>{p.time}</span>
                    {p.gps?.dist!=null&&<span style={{color:TEXT_DIM,fontSize:11}}>📍{p.gps.dist}m</span>}
                  </div>)}
                </div>
              </td></tr>}
            </React.Fragment>);
          })}
        </tbody>
      </table>
    </div>
  </div>);
}

// ── ADVANCE PANEL ────────────────────────────────────────
function AdvancePanel({staffList,advances,setAdvances}){
  const now=new Date();
  const nf=staffList.filter(s=>!s.isFounder);
  const[sel,setSel]=useState(nf[0]?.id||"");
  const[form,setForm]=useState({type:"taken",amount:"",note:"",month:toMK(now.getFullYear(),now.getMonth()+1)});
  const[saved,setSaved]=useState(false);const[delId,setDelId]=useState(null);
  const staff=staffList.find(s=>s.id===sel);
  const sa=advances.filter(a=>a.staffId===sel).sort((a,b)=>b.date.localeCompare(a.date));
  const totalTaken=sa.filter(a=>a.type==="taken").reduce((s,a)=>s+a.amount,0);
  const totalDep=sa.filter(a=>a.type==="deposit").reduce((s,a)=>s+a.amount,0);
  const due=Math.max(0,(staff?.advancePrev||0)+totalTaken-totalDep);
  const mk=toMK(now.getFullYear(),now.getMonth()+1);
  const ctaken=sa.filter(a=>a.month===mk&&a.type==="taken").reduce((s,a)=>s+a.amount,0);
  const cdep=sa.filter(a=>a.month===mk&&a.type==="deposit").reduce((s,a)=>s+a.amount,0);
  function add(){if(!form.amount||isNaN(+form.amount)||+form.amount<=0)return;setAdvances(p=>[...p,{id:Date.now()+"",staffId:sel,type:form.type,amount:+form.amount,note:form.note,month:form.month,date:todayStr()}]);setForm(f=>({...f,amount:"",note:""}));setSaved(true);setTimeout(()=>setSaved(false),2000);}
  const monthOpts=useMemo(()=>[2024,2025,2026,2027].flatMap(y=>MN.map((m,i)=>({label:`${m} ${y}`,val:`${y}-${String(i+1).padStart(2,"0")}`}))),[]);

// ── SYNC SALARY TO SHEET ─────────────────────────────────
function SyncSalaryBtn({scriptUrl,staffList,advances}){
  const now=new Date();
  const[month,setMonth]=useState(now.getMonth()+1);
  const[year,setYear]=useState(now.getFullYear());
  const[status,setStatus]=useState(null);
  async function sync(){
    if(!scriptUrl){setStatus("error");return;}
    setStatus("loading");
    try{
      const mk=toMK(year,month);
      await sheetsAPI(scriptUrl,{action:"syncSalary",month:mk,staffList,advances});
      setStatus("ok");setTimeout(()=>setStatus(null),4000);
    }catch(e){setStatus("error");setTimeout(()=>setStatus(null),4000);}
  }
  return(<div style={{marginTop:14}}>
    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
      <select value={month} onChange={e=>setMonth(Number(e.target.value))} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:6,padding:"7px 10px",color:"#fff",fontSize:12,outline:"none"}}>{MN.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select>
      <select value={year} onChange={e=>setYear(Number(e.target.value))} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:6,padding:"7px 10px",color:"#fff",fontSize:12,outline:"none"}}>{[2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}</select>
      <button onClick={sync} disabled={status==="loading"} style={{background:`linear-gradient(135deg,${GREEN},#2e7d32)`,border:"none",borderRadius:8,padding:"8px 18px",color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
        {status==="loading"?<><Spinner color="#fff"/> Syncing…</>:"💰 Sync Salary to Sheet"}
      </button>
    </div>
    {status==="ok"&&<p style={{color:GREEN,fontSize:12}}>✅ Monthly Salary sheet updated in Google Sheet!</p>}
    {status==="error"&&<p style={{color:RED,fontSize:12}}>❌ Failed — check Google Sheets connection.</p>}
  </div>);
}
// ── INITIALIZE ALL SHEETS ────────────────────────────────
function InitSheets({scriptUrl,staffList,advances}){
  const[status,setStatus]=useState(null);
  async function initAll(){
    if(!scriptUrl){setStatus("error");return;}
    setStatus("loading");
    try{
      await sheetsAPI(scriptUrl,{action:"syncStaff",staff:staffList});
      await sheetsAPI(scriptUrl,{action:"syncAdvance",advances,staffList});
      await sheetsAPI(scriptUrl,{action:"initSheets"});
      setStatus("ok");
      setTimeout(()=>setStatus(null),4000);
    }catch(e){setStatus("error");setTimeout(()=>setStatus(null),4000);}
  }
  return(<div>
    <button onClick={initAll} disabled={status==="loading"} style={{background:`linear-gradient(135deg,${PURPLE},#6a4c9c)`,border:"none",borderRadius:8,padding:"10px 22px",color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
      {status==="loading"?<><Spinner color="#fff"/> Creating sheets…</>:"🗂️ Initialize All Sheets"}

}

// ── PWA INSTALL PROMPT ────────────────────────────────────
function InstallBanner(){
  const[prompt,setPrompt]=useState(null);
  const[shown,setShown]=useState(false);
  const[dismissed,setDismissed]=useState(false);
  useEffect(()=>{
    const handler=e=>{e.preventDefault();setPrompt(e);setShown(true);};
    window.addEventListener("beforeinstallprompt",handler);
    return()=>window.removeEventListener("beforeinstallprompt",handler);
  },[]);
  if(!shown||dismissed)return null;
  async function install(){
    if(!prompt)return;
    prompt.prompt();
    const{outcome}=await prompt.userChoice;
    setDismissed(true);
  }
  return(<div style={{background:`${GOLD}15`,border:`1px solid ${GOLD}55`,borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
    <div>
      <div style={{color:GOLD,fontSize:12,fontWeight:700,marginBottom:2}}>📲 Install as App</div>
      <div style={{color:TEXT_DIM,fontSize:11}}>Add to home screen for quick access — works offline</div>
    </div>
    <div style={{display:"flex",gap:8}}>
      <button onClick={install} style={{background:GOLD,border:"none",borderRadius:7,padding:"7px 14px",color:BLACK,fontSize:12,fontWeight:800,cursor:"pointer"}}>Install</button>
      <button onClick={()=>setDismissed(true)} style={{background:"none",border:"none",color:TEXT_DIM,fontSize:18,cursor:"pointer",padding:"0 4px"}}>×</button>
    </div>
  </div>);
}

// iOS install instructions banner
function IOSInstallTip(){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const isStandalone=window.matchMedia("(display-mode: standalone)").matches;
  const[dismissed,setDismissed]=useState(()=>localStorage.getItem("ios_tip_dismissed")==="1");
  if(!isIOS||isStandalone||dismissed)return null;
  return(<div style={{background:`${BLUE}12`,border:`1px solid ${BLUE}44`,borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
    <div>
      <div style={{color:BLUE,fontSize:12,fontWeight:700,marginBottom:2}}>📲 Add to Home Screen (iPhone)</div>
      <div style={{color:TEXT_DIM,fontSize:11}}>Tap <strong style={{color:"#fff"}}>Share ↑</strong> → <strong style={{color:"#fff"}}>"Add to Home Screen"</strong> → Add</div>
    </div>
    <button onClick={()=>{setDismissed(true);localStorage.setItem("ios_tip_dismissed","1");}} style={{background:"none",border:"none",color:TEXT_DIM,fontSize:18,cursor:"pointer",padding:"0 4px"}}>×</button>
  </div>);
}

// ── OWNER PASSWORD GATE ───────────────────────────────────
function OwnerGate({onUnlock}){
  const[pw,setPw]=useState("");const[err,setErr]=useState(false);const[shake,setShake]=useState(false);
  function tryUnlock(){if(pw===OWNER_PASSWORD){onUnlock();}else{setErr(true);setShake(true);setPw("");setTimeout(()=>setShake(false),500);}}
  return(<div style={{minHeight:"100vh",background:BLACK,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{width:"100%",maxWidth:340,textAlign:"center"}}>
      <div style={{width:56,height:56,background:`linear-gradient(135deg,${GOLD},#8B6914)`,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:900,color:BLACK,margin:"0 auto 16px"}}>M</div>
      <h2 style={{color:GOLD,fontSize:20,fontWeight:800,marginBottom:4}}>MADHUSHREE</h2>
      <p style={{color:TEXT_DIM,fontSize:13,marginBottom:28}}>Owner / Admin Access</p>
      <div className={shake?"shake":""} style={{background:SURFACE2,border:`1px solid ${err?RED:BORDER}`,borderRadius:10,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
        <span style={{color:TEXT_DIM,fontSize:18}}>🔒</span>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&tryUnlock()} placeholder="Enter owner password" autoFocus style={{background:"none",border:"none",color:"#fff",fontSize:15,outline:"none",flex:1}}/>
      </div>
      {err&&<p style={{color:RED,fontSize:12,marginBottom:10}}>Wrong password</p>}
      <button onClick={tryUnlock} style={{background:`linear-gradient(135deg,${GOLD},#8B6914)`,border:"none",borderRadius:10,padding:"13px",width:"100%",color:BLACK,fontSize:15,fontWeight:800,cursor:"pointer"}}>Unlock Admin</button>
    </div>
  </div>);
}

// ── ROOT APP ─────────────────────────────────────────────
// ── localStorage helpers ─────────────────────────────────
function loadLS(key,def){
  try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}
  catch(e){console.warn("loadLS error",key,e);return def;}
}
function saveLS(key,val){
  try{
    if(key.endsWith("_staff")){
      const slim=val.map(s=>({...s,photo:null}));
      localStorage.setItem(key,JSON.stringify(slim));
      val.forEach(s=>{
        if(s.photo){
          try{localStorage.setItem(key+"_photo_"+s.id,s.photo);}
          catch(e){console.warn("Photo save failed for",s.id);}
        }
      });
    } else {
      localStorage.setItem(key,JSON.stringify(val));
    }
  }catch(e){console.warn("saveLS error",key,e);}
}
function loadStaffLS(key,def){
  try{
    const v=localStorage.getItem(key);
    if(!v)return def;
    const staff=JSON.parse(v);
    return staff.map(s=>{
      const photo=localStorage.getItem(key+"_photo_"+s.id)||null;
      return{...s,photo};
    });
  }catch(e){console.warn("loadStaffLS error",e);return def;}
}

function App(){
  const[mode,setMode]=useState("staff");
  const[adminTab,setAdminTab]=useState("log");
  const[office,setOffice]=useState(()=>loadLS("mda_office",DEFAULT_OFFICE));
  // Always use INITIAL_STAFF from HTML as base, merge with any saved customizations
const[staffList,setStaffList]=useState(()=>{
  try{
    const saved=localStorage.getItem("mda_staff");
    if(!saved)return INITIAL_STAFF;
    const savedStaff=JSON.parse(saved);
    return INITIAL_STAFF.map(s=>{
      const found=savedStaff.find(x=>x.id===s.id);
      if(found){
        const photo=localStorage.getItem("mda_staff_photo_"+s.id)||null;
        return{...s,...found,photo};
      }
      return s;
    });
  }catch(e){return INITIAL_STAFF;}
});
  const[punches,setPunches]=useState(()=>loadLS("mda_punches",{}));
  const[advances,setAdvances]=useState(()=>loadLS("mda_advances",[]));
  const HARDCODED_URL="https://script.google.com/macros/s/AKfycbz8XUOF3ao44rrpgtgwJAFzhDUHHcw1mZk7VmmTH0VhHlAwPcCuKSF-QpdYA2axJUCeEQ/exec";
  const[scriptUrl,setScriptUrl]=useState(()=>loadLS("mda_url",HARDCODED_URL));
  const[syncStatus,setSyncStatus]=useState(null);

  // Auto-save everything to localStorage whenever it changes
  useEffect(()=>saveLS("mda_office",office),[office]);
  useEffect(()=>saveLS("mda_staff",staffList),[staffList]);
  useEffect(()=>saveLS("mda_punches",punches),[punches]);
  useEffect(()=>saveLS("mda_advances",advances),[advances]);
  useEffect(()=>saveLS("mda_url",scriptUrl),[scriptUrl]);

  function updateStaffPhoto(id,photo){setStaffList(prev=>prev.map(s=>s.id===id?{...s,photo}:s));}
  const staffWithCb=staffList.map(s=>({...s,_photoCallback:s.photo?null:(photo=>updateStaffPhoto(s.id,photo))}));

  if(mode==="owner_gate")return<OwnerGate onUnlock={()=>setMode("admin")}/>;

  return(<div style={{minHeight:"100vh",background:BLACK,color:"#fff",fontFamily:"'Inter',system-ui,sans-serif"}}>
    <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`,padding:"0 14px",position:"sticky",top:0,zIndex:100}}>
      <div style={{maxWidth:800,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,background:`linear-gradient(135deg,${GOLD},#8B6914)`,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:BLACK}}>M</div>
            <div><div style={{fontSize:13,fontWeight:800,color:"#fff"}}>MADHUSHREE</div><div style={{fontSize:8,color:GOLD,letterSpacing:1.5,textTransform:"uppercase",fontWeight:600}}>Attendance</div></div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {mode==="admin"&&<button onClick={()=>setMode("staff")} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:7,padding:"5px 10px",color:TEXT_DIM,fontSize:10,fontWeight:700,cursor:"pointer"}}>👤 Staff View</button>}
            {mode==="staff"&&<button onClick={()=>setMode("owner_gate")} style={{background:`${GOLD}18`,border:`1px solid ${GOLD}44`,borderRadius:7,padding:"5px 10px",color:GOLD,fontSize:10,fontWeight:700,cursor:"pointer"}}>🔒 Admin</button>}
            {mode==="admin"&&<button onClick={()=>setMode("staff")} style={{background:`${RED}18`,border:`1px solid ${RED}44`,borderRadius:7,padding:"5px 10px",color:RED,fontSize:10,fontWeight:700,cursor:"pointer"}}>🔒 Lock</button>}
          </div>
        </div>
        {mode==="admin"&&<div style={{display:"flex",marginTop:3,overflowX:"auto"}}>
          {[["log","📋 Log"],["salary","💰 Salary"],["advance","📑 Advance"],["staff","👥 Staff"],["settings","⚙️ Settings"]].map(([k,l])=><Tab key={k} label={l} active={adminTab===k} onClick={()=>setAdminTab(k)}/>)}
        </div>}
        {mode==="staff"&&<div style={{paddingBottom:8}}/>}
      </div>
    </div>
    <div style={{maxWidth:800,margin:"0 auto",padding:"18px 14px"}}>
      {mode!=="owner_gate"&&<Banner scriptUrl={scriptUrl} syncStatus={syncStatus}/>}
      <InstallBanner/>
      <IOSInstallTip/>
      {mode==="staff"&&<PunchPanel staffList={staffWithCb} punches={punches} setPunches={setPunches} office={office} scriptUrl={scriptUrl} setSyncStatus={setSyncStatus}/>}
      {mode==="admin"&&adminTab==="log"&&<PunchLogPanel staffList={staffList} punches={punches}/>}
      {mode==="admin"&&adminTab==="salary"&&<SalaryPanel staffList={staffList} punches={punches} advances={advances}/>}
      {mode==="admin"&&adminTab==="advance"&&<AdvancePanel staffList={staffList} advances={advances} setAdvances={setAdvances}/>}
      {mode==="admin"&&adminTab==="staff"&&<StaffPanel staffList={staffList} setStaffList={setStaffList} punches={punches} setPunches={setPunches}/>}
      {mode==="admin"&&adminTab==="settings"&&<SettingsPanel office={office} setOffice={setOffice} scriptUrl={scriptUrl} setScriptUrl={setScriptUrl} staffList={staffList} advances={advances}/>}
    </div>
    <div style={{textAlign:"center",padding:"12px 0 24px",color:TEXT_DIM,fontSize:9}}>MADHUSHREE · Attendance System</div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
